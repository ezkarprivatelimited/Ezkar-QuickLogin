<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezkar QuickLogin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            width: 320px;
            background-color: #f9fafb;
            color: #1f2937;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4338ca 0%, #312e81 100%);
            padding: 20px 16px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-icon {
            width: 24px;
            height: 24px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-icon svg {
            width: 14px;
            height: 14px;
            color: white;
        }

        .header-text {
            font-weight: 600;
            font-size: 15px;
            letter-spacing: -0.01em;
        }

        .status-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 9999px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .status-badge.idle {
            background-color: rgba(255, 255, 255, 0.15);
            color: #e0e7ff;
        }

        .status-badge.ready {
            background-color: #10b981;
            color: white;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        .content {
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
            text-align: center;
        }

        .details-text {
            font-size: 14px;
            color: #4b5563;
            line-height: 1.5;
            margin: 0;
        }

        .details-text strong {
            color: #111827;
        }

        .username-card {
            background-color: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 16px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            display: none;
        }

        .username-card.visible {
            display: block;
        }

        .username-label {
            font-size: 11px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .username-value {
            font-family: monospace;
            font-size: 15px;
            font-weight: 600;
            color: #4338ca;
            word-break: break-all;
        }

        .btn {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            margin-top: 8px;
        }

        .btn:hover {
            background-color: #4338ca;
        }

        .btn-cancel {
            background-color: white;
            color: #ef4444;
            border: 1px solid #f87171;
            box-shadow: none;
        }

        .btn-cancel:hover {
            background-color: #fef2f2;
        }

        .footer {
            padding: 12px;
            text-align: center;
            font-size: 11px;
            color: #9ca3af;
            border-top: 1px solid #e5e7eb;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">
            <div class="header-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                    <polyline points="10 17 15 12 10 7"></polyline>
                    <line x1="15" y1="12" x2="3" y2="12"></line>
                </svg>
            </div>
            <div class="header-text">QuickLogin</div>
        </div>
        <div id="status-badge" class="status-badge idle">Standing By</div>
    </div>

    <div class="content">
        <p id="details-msg" class="details-text">
            No pending credentials found. Please click <strong>"Login to GST"</strong> from your Ezkar Dashboard to initiate auto-login.
        </p>

        <div id="username-card" class="username-card">
            <div class="username-label">Target Account</div>
            <div id="username-val" class="username-value">---</div>
        </div>

        <button id="action-btn" class="btn">Open Dashboard</button>
    </div>

    <div class="footer">
        Secure extension for Ezkar Dashboard
    </div>

    <script src="popup.js"></script>
</body>
</html>
